<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="main">
    <div class="quiz-block">
        <h1>Угадай текст в меме</h1>

        <p class="write">Введи ниже текст из мема</p>

        <div class="score">

        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
