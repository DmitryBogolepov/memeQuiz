<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="main">
    <div class="quiz">
        <h1 class="main-title">Угадай текст в меме</h1>
        <div class="starter-page" id="startPage">
            <h2>Начать тест</h2>
            <img class="stater-image" src="images/images1.jfif" alt="cat bg">
            <button class="start-btn" id="startBtn">Начать</button>
        </div>


        <div class="quiz-block" id="quizBlock">
            <div class="question-number">Вопрос: <span id="currentQuestion"></span> из <span id="allQuestions"></span></div>
            <img src="" alt="Meme image" id="memeImg" class="question-img">
            <img src="" alt="Correct meme image" id="correctMemeImg" class="correct-img">
            <p class="write" id="write">Введи ниже текст из мема</p>
            <div class="input-item">
                <input type="text" id="memeInput" placeholder="ААААААА">
                <button class="submit-btn" id="submitBtn">Проверить</button>
            </div>

            <div class="score">
                <p class="answers">Всего ответов: <span id="answer"></span></p>
                <p class="correct">| Правильных ответов: <span id="correct"></span> |</p>
                <p class="notCorrect">Неправильных ответов: <span id="notCorrect"></span></p>
            </div>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
